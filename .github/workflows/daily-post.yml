name: Crown Agency — Daily X Post

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST every day
  workflow_dispatch:         # Manual trigger from GitHub UI anytime

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate and post to X
        run: node scripts/dailyPost.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_ID: ${{ secrets.BUFFER_PROFILE_ID }}
